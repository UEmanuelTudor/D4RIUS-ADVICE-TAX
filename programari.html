!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Admin d4riusTAX v4.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com" rel="stylesheet">
<style>
:root{--primary:#14314d;--secondary:#ff7a18;--dark:#0b1b2b;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f0f2f5;min-height:100vh;color:#333;}

/* LOGIN */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--primary),var(--dark));}
.login-box{background:#fff;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:380px;text-align:center;}
.login-box h1{color:var(--primary);font-size:24px;margin-bottom:20px;}
.login-box input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:12px;margin-bottom:14px;outline:none;}
.login-box button{width:100%;padding:14px;background:var(--secondary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}

/* ADMIN PANEL */
#admin-panel{display:none;}
.topbar{background:linear-gradient(135deg,var(--primary),var(--dark));padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.topbar h1{color:#fff;font-size:20px;}
.topbar h1 span{color:var(--secondary);}
.logout-btn{background:rgba(255,255,255,0.1);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;}

.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 24px;gap:4px;}
.tab{padding:16px 24px;cursor:pointer;font-weight:600;color:#888;border-bottom:3px solid transparent;position:relative;}
.tab.active{color:var(--secondary);border-bottom-color:var(--secondary);}
.tab .badge{position:absolute;top:8px;right:-5px;background:var(--secondary);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;}

.content{padding:24px;max-width:1400px;margin:0 auto;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,0.08);border-left:5px solid var(--primary);}
.stat-card .num{font-size:32px;font-weight:800;color:var(--primary);}

/* FORM */
.add-form{background:#fff;border-radius:16px;padding:24px;margin-bottom:24px;box-shadow:0 4px 15px rgba(0,0,0,0.08);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.form-grid input, .form-grid select, .form-grid textarea{padding:12px;border:2px solid #e8ecf4;border-radius:10px;font-size:14px;outline:none;}
.form-grid textarea{grid-column: span 2;}

/* TOOLS */
.tools{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.search-box{padding:12px 20px;border:2px solid #e8ecf4;border-radius:10px;width:300px;outline:none;background:#fff;}

/* TABLE */
.table-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.08);}
table{width:100%;border-collapse:collapse;}
th{background:#f8faff;padding:14px 16px;text-align:left;font-size:11px;text-transform:uppercase;color:#888;font-weight:800;}
td{padding:16px;border-bottom:1px solid #f0f0f0;vertical-align:top;}

/* STATUS TAGS */
.status-tag {padding:4px 8px; border-radius:6px; font-size:10px; font-weight:800; text-transform:uppercase;}
.st-active {background:#e0f2fe; color:#0369a1;}
.st-done {background:#dcfce7; color:#16a34a;}
.st-cancel {background:#fef3c7; color:#d97706;}
.st-trash {background:#fee2e2; color:#dc2626;}

.actions{display:flex;gap:6px;}
.actions button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;font-size:10px;font-weight:700; transition: 0.2s;}
.btn-green{background:var(--green); color:#fff;}
.btn-yellow{background:var(--yellow); color:#fff;}
.btn-red{background:var(--red); color:#fff;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-restore {background:#e2e8f0; color:#475569;}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-box">
    <h1>🔐 Admin d4riusTAX</h1>
    <input type="text" id="log-user" placeholder="Utilizator">
    <input type="password" id="log-pass" placeholder="Parolă">
    <button onclick="checkAuth()">AUTENTIFICARE</button>
  </div>
</div>

<div id="admin-panel">
  <div class="topbar">
    <h1>📋 Admin <span>Panel v4.0</span></h1>
    <button class="logout-btn" onclick="location.reload()">IEȘIRE</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="t-active" onclick="switchTab('active')">📊 Dashboard <span class="badge" id="b-active">0</span></div>
    <div class="tab" id="t-ended" onclick="switchTab('ended')">✅ Finalizate/Anulate <span class="badge" id="b-ended">0</span></div>
    <div class="tab" id="t-trash" onclick="switchTab('trash')">🗑️ Coș de gunoi <span class="badge" id="b-trash">0</span></div>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat-card"><h4>Active</h4><div class="num" id="s-active">0</div></div>
      <div class="stat-card" style="border-left-color:var(--green)"><h4>Total Servit</h4><div class="num" id="s-ended">0</div></div>
    </div>

    <div id="form-section" class="add-form">
      <h3 style="margin-bottom:15px; color:var(--primary)">➕ Adăugare Programare</h3>
      <div class="form-grid">
        <input type="text" id="in-nume" placeholder="Nume Client *">
        <input type="text" id="in-ref" value="D4TAX-" oninput="if(!this.value.startsWith('D4TAX-'))this.value='D4TAX-'">
        <input type="email" id="in-email" placeholder="Email">
        <input type="tel" id="in-tel" placeholder="Telefon">
        <input type="date" id="in-data">
        <select id="in-ora">
            <option value="">Alege Ora (Fixă)</option>
            <option value="08:00">08:00</option><option value="09:00">09:00</option>
            <option value="10:00">10:00</option><option value="11:00">11:00</option>
            <option value="12:00">12:00</option><option value="13:00">13:00</option>
            <option value="14:00">14:00</option><option value="15:00">15:00</option>
            <option value="16:00">16:00</option><option value="17:00">17:00</option>
            <option value="18:00">18:00</option>
        </select>
        <textarea id="in-obs" placeholder="Note suplimentare..."></textarea>
      </div>
      <div style="text-align:right; margin-top:15px;">
        <button onclick="saveClient()" style="background:var(--green); color:#fff; border:none; padding:12px 35px; border-radius:10px; font-weight:700; cursor:pointer;">SALVEAZĂ</button>
      </div>
    </div>

    <div class="tools">
        <input type="text" id="search-input" class="search-box" placeholder="🔍 Caută după nume sau REF..." oninput="render()">
        <div style="font-size:12px; font-weight:600; color:#888;">Orar: <span style="color:var(--secondary)">08:00 - 18:00</span></div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Identitate</th>
            <th>Contact</th>
            <th>Programare</th>
            <th>Status / Detalii</th>
            <th>Acțiuni</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const _u = "YWRtaW4="; const _p = "ZDRyaXVzdGF4MjAyNiE=";
let clients = JSON.parse(localStorage.getItem('dtax_v4')) || [];
let currentView = 'active';

function checkAuth() {
    if(btoa(document.getElementById('log-user').value) === _u && btoa(document.getElementById('log-pass').value) === _p) {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        render();
    }
}

function saveClient() {
    const n = document.getElementById('in-nume').value;
    const o = document.getElementById('in-ora').value;
    if(!n || !o) return alert("Numele și Ora sunt obligatorii!");

    clients.push({
        id: Date.now(),
        nume: n,
        ref: document.getElementById('in-ref').value,
        email: document.getElementById('in-email').value || '-',
        tel: document.getElementById('in-tel').value || '-',
        data: document.getElementById('in-data').value || '-',
        ora: o,
        obs: document.getElementById('in-obs').value || '',
        status: 'active',
        meta_info: '' // Ora plecare sau Motiv anulare
    });
    update();
    document.querySelectorAll('.form-grid input:not(#in-ref), select, textarea').forEach(i => i.value = '');
}

function changeStatus(id, newStatus) {
    let meta = "";
    if(newStatus === 'done') {
        meta = prompt("Ora de plecare a clientului:", "12:00");
        if(meta === null) return;
    } else if(newStatus === 'cancel') {
        meta = prompt("Motivul anulării (Ex: Nu a răspuns, A reprogramat):", "Nu a mai venit");
        if(meta === null) return;
    }

    clients = clients.map(c => c.id === id ? {...c, status: newStatus, meta_info: meta} : c);
    update();
}

function permanentDelete(id) {
    if(confirm("Ștergi definitiv această înregistrare?")) {
        clients = clients.filter(c => c.id !== id);
        updateStorage();
    }
}

function switchTab(v) {
    currentView = v;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('t-' + v).classList.add('active');
    document.getElementById('form-section').style.display = v === 'active' ? 'block' : 'none';
    render();
}

function render() {
    const body = document.getElementById('table-body');
    const search = document.getElementById('search-input').value.toLowerCase();
    body.innerHTML = '';
    
    clients.filter(c => {
        let matchTab = (currentView === 'active' ? c.status === 'active' : (currentView === 'ended' ? (c.status === 'done' || c.status === 'cancel') : c.status === 'trash'));
        let matchSearch = c.nume.toLowerCase().includes(search) || c.ref.toLowerCase().includes(search);
        return matchTab && matchSearch;
    }).forEach(c => {
        let statusHtml = '';
        if(c.status === 'active') statusHtml = '<span class="status-tag st-active">Confirmat</span>';
        else if(c.status === 'done') statusHtml = `<span class="status-tag st-done">Finalizat • Plecare: ${c.meta_info}</span>`;
        else if(c.status === 'cancel') statusHtml = `<span class="status-tag st-cancel">Anulat • Motiv: ${c.meta_info}</span>`;
        else statusHtml = '<span class="status-tag st-trash">În Coș</span>';

        let actions = '';
        if(c.status === 'active') {
            actions = `<button class="btn-green" onclick="changeStatus(${c.id}, 'done')">A VENIT</button>
                       <button class="btn-yellow" onclick="changeStatus(${c.id}, 'cancel')">ANULAT</button>
                       <button class="btn-red" onclick="changeStatus(${c.id}, 'trash')">🗑️</button>`;
        } else if(c.status === 'trash') {
            actions = `<button class="btn-restore" onclick="changeStatus(${c.id}, 'active')">RESTAURARE</button>
                       <button class="btn-red" style="background:#000" onclick="permanentDelete(${c.id})">DEL FINAL</button>`;
        } else {
            // Tab Finalizate/Anulate
            actions = `<button class="btn-restore" onclick="changeStatus(${c.id}, 'active')">RESTAURARE</button>
                       <button class="btn-red" onclick="changeStatus(${c.id}, 'trash')">🗑️ COȘ</button>`;
        }

        body.innerHTML += `
            <tr>
                <td><strong>${c.nume}</strong><br><small style="color:var(--secondary);font-weight:700">${c.ref}</small></td>
                <td style="font-size:12px;">📧 ${c.email}<br>📞 ${c.tel}</td>
                <td>📅 ${c.data}<br>🕒 <strong>${c.ora}</strong></td>
                <td>${statusHtml}<br><p style="font-size:11px; color:#666; margin-top:5px;">${c.obs}</p></td>
                <td><div class="actions">${actions}</div></td>
            </tr>`;
    });

    const b = {
        act: clients.filter(x => x.status === 'active').length,
        end: clients.filter(x => x.status === 'done' || x.status === 'cancel').length,
        trsh: clients.filter(x => x.status === 'trash').length
    };
    document.getElementById('b-active').innerText = b.act;
    document.getElementById('b-ended').innerText = b.end;
    document.getElementById('b-trash').innerText = b.trsh;
    document.getElementById('s-active').innerText = b.act;
    document.getElementById('s-ended').innerText = clients.filter(x => x.status === 'done').length;
}

function update() { localStorage.setItem('dtax_v4', JSON.stringify(clients)); render(); }
function updateStorage() { update(); }
</script>
</body>
</html>
